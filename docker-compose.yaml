services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    ports:
      - "5432:5432"

  airflow-webserver:
    build: .
    image: airflow-with-java:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      TALEND_PIPELINE_SCHEDULE_MIDNIGHT: "0 0 * * *"
      TALEND_PIPELINE_SCHEDULE_2150: "50 21 * * *"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./talend:/opt/airflow/talend
      - C:/Projet_PI_BI:/opt/airflow/projet_pi_bi:ro
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: root
    entrypoint: /entrypoint-wrapper.sh
    command: >
      bash -c "
      su airflow -c 'airflow db migrate' &&
      su airflow -c 'airflow users create
        --username $$_AIRFLOW_WWW_USER_USERNAME
        --password $$_AIRFLOW_WWW_USER_PASSWORD
        --firstname $$_AIRFLOW_WWW_USER_FIRSTNAME
        --lastname $$_AIRFLOW_WWW_USER_LASTNAME
        --role $$_AIRFLOW_WWW_USER_ROLE
        --email $$_AIRFLOW_WWW_USER_EMAIL || true' &&
      su airflow -c 'airflow webserver --port 8080'"
    restart: always

  airflow-scheduler:
    build: .
    image: airflow-with-java:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      TALEND_PIPELINE_SCHEDULE_MIDNIGHT: "0 0 * * *"
      TALEND_PIPELINE_SCHEDULE_2150: "50 21 * * *"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./talend:/opt/airflow/talend
      - C:/Projet_PI_BI:/opt/airflow/projet_pi_bi:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: root
    entrypoint: /entrypoint-wrapper.sh
    command: >
      bash -c "su airflow -c 'airflow scheduler'"
    restart: always

volumes:
  postgres-db-volume: